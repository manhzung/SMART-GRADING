# ============================================================
# SMART GRADING - Production Docker Compose
# Deploys: Backend API + MongoDB (no AMC container - runs in main container)
# ============================================================

version: '3.8'

services:
  # ============================================================
  # MONGODB - Cloud managed via Atlas, or local container
  # ============================================================
  # OPTION A: Local MongoDB container (uncomment if not using Atlas)
  # mongodb:
  #   image: mongo:7.0
  #   container_name: smart-grading-mongodb
  #   restart: unless-stopped
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
  #     MONGO_INITDB_DATABASE: smart-grading
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - app-network
  #   ports:
  #     - "27017:27017"
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ============================================================
  # NODE.JS BACKEND + AMC (Single container)
  # ============================================================
  node-server:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: smart-grading/server:latest
    container_name: smart-grading-server
    restart: unless-stopped
    environment:
      # Node Environment
      NODE_ENV: production
      PORT: 5000

      # MongoDB (Atlas or local)
      # For Atlas: mongodb+srv://user:pass@cluster.mongodb.net/smart-grading
      # For local: mongodb://mongodb:27017/smart-grading
      MONGODB_URL: ${MONGODB_URL}

      # Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # AI Provider (Gemini)
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Cloudinary (file uploads)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # WebSocket
      WS_URL: ${WS_URL:-ws://localhost:5000}

      # AMC Configuration
      AMC_PROJECTS_DIR: /home/amc/amc-projects
      DISPLAY: ":99"
    volumes:
      # Mount AMC projects directory
      - amc_projects:/home/amc/amc-projects
      # Logs
      - server_logs:/app/logs
      # Uploads
      - server_uploads:/app/uploads
    networks:
      - app-network
    ports:
      - "5000:5000"
    # depends_on:
    #   - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================================
# VOLUMES
# ============================================================
volumes:
  mongodb_data:
    driver: local
  amc_projects:
    driver: local
  server_logs:
    driver: local
  server_uploads:
    driver: local

# ============================================================
# NETWORKS
# ============================================================
networks:
  app-network:
    driver: bridge
